# Netlify configuration for the EMG Loop monorepo.
#
# The deploy target is the Next.js app in apps/web. The build runs from the
# repo root so npm workspaces install correctly, then builds only the web app
# via Turborepo. The official Next.js plugin handles the publish output.
#
# Scope: deploy configuration only. No business features, auth, or provider
# integrations are introduced here.

[build]
  # Install at the workspace root, then build just the web app and its deps.
  command = "npm run build -- --filter=@emgloop/web"
  # Next.js build output for the web app.
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "22"
  # Production deploys default to NODE_ENV=production, which would skip
  # devDependencies. Turbo (the build runner) is a root devDependency, so we
  # must force dev dependencies to install or the build hits "turbo: not found".
  # (Do NOT use "--workspaces" here: it installs only workspace packages and
  # skips the ROOT devDependencies, which is what broke the production build.)
  NPM_FLAGS = "--include=dev"

# Official Next.js runtime for Netlify (handles routing, SSR, and the
# publish directory for the App Router build).
[[plugins]]
  package = "@netlify/plugin-nextjs"

# --- TEMPORARY (hotfix-neon-db-setup) -------------------------------------
# Bundle the Prisma schema, migrations, seed, and the Prisma/tsx CLIs into the
# serverless functions so the one-time POST /api/admin/setup-database route can
# run `prisma migrate deploy` and `prisma db seed` from the deployed environment.
#
# REMOVE this [functions] block in the cleanup hotfix together with the route.
# See docs/HOTFIX-NEON-DB-SETUP.md. This is bootstrap plumbing, not a feature.
[functions]
included_files = [
  "packages/database/prisma/**",
    "packages/database/package.json",
      "node_modules/prisma/**",
        "node_modules/@prisma/**",
          "node_modules/.bin/prisma",
            "node_modules/tsx/**",
              "node_modules/.bin/tsx",
              ]
              # --- END TEMPORARY ---------------------------------------------------------
              
